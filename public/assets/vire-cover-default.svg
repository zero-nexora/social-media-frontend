<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="400" fill="#EFF6FF"/>

  <!-- Subtle grid lines -->
  <g stroke="#BFDBFE" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200"  y1="0" x2="200"  y2="400"/>
    <line x1="400"  y1="0" x2="400"  y2="400"/>
    <line x1="600"  y1="0" x2="600"  y2="400"/>
    <line x1="800"  y1="0" x2="800"  y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Large decorative V mark — very faint, background texture -->
  <path d="M460 60 L600 330 L740 60"
    stroke="#BFDBFE" stroke-width="48" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

  <!-- Accent dot on V -->
  <circle cx="740" cy="60" r="42" fill="#DBEAFE" opacity="0.6"/>
  <circle cx="740" cy="60" r="18" fill="#BFDBFE" opacity="0.8"/>

  <!-- Small floating dots — network/connection motif -->
  <!-- Left cluster -->
  <circle cx="80"  cy="100" r="5" fill="#93C5FD" opacity="0.5"/>
  <circle cx="130" cy="60"  r="3" fill="#60A5FA" opacity="0.4"/>
  <circle cx="160" cy="140" r="4" fill="#93C5FD" opacity="0.35"/>
  <circle cx="50"  cy="200" r="6" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="110" cy="260" r="3" fill="#60A5FA" opacity="0.3"/>

  <!-- Connector lines left -->
  <line x1="80" y1="100" x2="130" y2="60"  stroke="#93C5FD" stroke-width="1" opacity="0.35"/>
  <line x1="80" y1="100" x2="160" y2="140" stroke="#93C5FD" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="200" x2="110" y2="260" stroke="#93C5FD" stroke-width="1" opacity="0.3"/>

  <!-- Right cluster -->
  <circle cx="1120" cy="80"  r="5" fill="#93C5FD" opacity="0.5"/>
  <circle cx="1060" cy="130" r="3" fill="#60A5FA" opacity="0.4"/>
  <circle cx="1150" cy="200" r="6" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="1080" cy="260" r="4" fill="#93C5FD" opacity="0.35"/>
  <circle cx="1140" cy="320" r="3" fill="#60A5FA" opacity="0.3"/>

  <!-- Connector lines right -->
  <line x1="1120" y1="80"  x2="1060" y2="130" stroke="#93C5FD" stroke-width="1" opacity="0.35"/>
  <line x1="1150" y1="200" x2="1080" y2="260" stroke="#93C5FD" stroke-width="1" opacity="0.3"/>
  <line x1="1080" y1="260" x2="1140" y2="320" stroke="#93C5FD" stroke-width="1" opacity="0.3"/>

  <!-- Bottom bar accent -->
  <rect x="0" y="390" width="1200" height="10" fill="#BFDBFE" opacity="0.4"/>

</svg>
